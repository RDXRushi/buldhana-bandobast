name: Build Windows Desktop App

# Triggers:
#   - Every push/PR to main (builds the .exe and uploads as workflow artifacts)
#   - Every tag that starts with v* (additionally creates a public Release)
#   - Manually from the GitHub Actions tab (workflow_dispatch)
on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Yarn
        run: npm install -g yarn

      - name: Build frontend (React) with relative API URL
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: ""
          CI: "false"   # CRA treats warnings-as-errors by default under CI
        run: |
          yarn install --frozen-lockfile
          yarn build

      - name: Copy frontend build into desktop\renderer
        shell: pwsh
        run: |
          if (Test-Path desktop\renderer) { Remove-Item -Recurse -Force desktop\renderer }
          Copy-Item -Recurse -Force frontend\build desktop\renderer

      - name: Download portable MongoDB 7.0
        shell: pwsh
        run: |
          $version = "7.0.14"
          $url = "https://fastdl.mongodb.org/windows/mongodb-windows-x86_64-$version.zip"
          $zip = "$env:TEMP\mongo.zip"
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing
          $tmp = "$env:TEMP\mongo-extract"
          if (Test-Path $tmp) { Remove-Item -Recurse -Force $tmp }
          Expand-Archive -Path $zip -DestinationPath $tmp -Force
          $src = Get-ChildItem -Path $tmp -Directory | Select-Object -First 1
          $dest = "desktop\resources\mongodb"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item -Recurse -Force (Join-Path $src.FullName "bin") $dest
          # Keep only mongod.exe + SSL/crypto DLLs to shrink installer
          Get-ChildItem -Path "$dest\bin" -File | Where-Object {
            $_.Name -ne "mongod.exe" -and $_.Name -notlike "*crypto*" -and $_.Name -notlike "*ssl*"
          } | Remove-Item -Force -ErrorAction SilentlyContinue
          Get-ChildItem -Path "$dest\bin" | Format-Table Name, Length

      - name: Install Python backend deps + PyInstaller
        working-directory: desktop\python-backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build bandobast-server.exe with PyInstaller
        working-directory: desktop\python-backend
        run: |
          pyinstaller bandobast-server.spec --clean --noconfirm

      - name: Copy PyInstaller output into desktop\resources\server
        shell: pwsh
        run: |
          $dest = "desktop\resources\server"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item -Force desktop\python-backend\dist\bandobast-server.exe $dest\bandobast-server.exe
          Get-Item "$dest\bandobast-server.exe" | Format-List Name, Length

      - name: Install Electron deps
        working-directory: desktop
        run: yarn install

      - name: Package with electron-builder (NSIS installer + portable)
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn dist

      - name: Show built artifacts
        shell: pwsh
        run: |
          Get-ChildItem desktop\dist -Recurse -Include *.exe |
            Select-Object Name, @{N="MB";E={[math]::Round($_.Length/1MB,1)}}, FullName |
            Format-Table -AutoSize

      - name: Upload .exe artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BuldhanaBandobast-Windows
          path: |
            desktop/dist/*.exe
            desktop/dist/latest.yml
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release (on tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/dist/*.exe
            desktop/dist/latest.yml
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
