name: Build Staff App APK

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      backend_url:
        description: "Admin backend URL (https://...)"
        required: false
        default: ""

jobs:
  build-staff-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Yarn
        run: npm install -g yarn

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-34 build-tools;34.0.0"

      - name: Install staff-app deps
        working-directory: staff-app
        run: yarn install --network-timeout 100000

      - name: Build React (with backend URL)
        working-directory: staff-app
        env:
          VITE_BACKEND_URL: ${{ github.event.inputs.backend_url || vars.STAFF_APP_BACKEND_URL || '' }}
        run: yarn build

      - name: Sync Capacitor → Android
        working-directory: staff-app
        run: npx --yes cap sync android

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        working-directory: staff-app/android
        run: |
          chmod +x ./gradlew
          if [ ! -s gradle/wrapper/gradle-wrapper.jar ]; then
            GRADLE_VER=$(grep distributionUrl gradle/wrapper/gradle-wrapper.properties \
              | sed -E 's/.*gradle-([0-9.]+)-.*/\1/')
            curl -fsSL -o /tmp/g.zip "https://services.gradle.org/distributions/gradle-${GRADLE_VER}-bin.zip"
            unzip -q /tmp/g.zip -d /tmp/g
            "/tmp/g/gradle-${GRADLE_VER}/bin/gradle" wrapper --gradle-version "${GRADLE_VER}" --distribution-type bin
          fi
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Collect APK
        working-directory: staff-app/android
        run: |
          mkdir -p ../../apk-out
          cp app/build/outputs/apk/debug/app-debug.apk ../../apk-out/BuldhanaBandobastStaff.apk
          ls -la ../../apk-out/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BuldhanaBandobastStaff-Android
          path: apk-out/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: apk-out/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
