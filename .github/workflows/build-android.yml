name: Build Android APK

# Triggers:
#   - Every push/PR to main (builds .apk as a downloadable artifact)
#   - Every tag starting with v* (also publishes a GitHub Release)
#   - Manually from the Actions tab
on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Yarn
        run: npm install -g yarn

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-34 build-tools;34.0.0"

      - name: Install frontend deps
        working-directory: frontend
        run: yarn install --network-timeout 100000

      - name: Build React with LOCAL (offline) backend shim
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: ""
          REACT_APP_USE_LOCAL: "true"
          CI: "false"
          PUBLIC_URL: "."
          GENERATE_SOURCEMAP: "false"
        run: yarn build

      - name: Sync Capacitor → Android
        working-directory: frontend
        run: npx --yes cap sync android

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK (Gradle)
        working-directory: frontend/android
        run: |
          chmod +x ./gradlew
          # Ensure gradle-wrapper.jar exists. Some repo pushes drop binary
          # assets — regenerate it with an installed Gradle if missing.
          if [ ! -s gradle/wrapper/gradle-wrapper.jar ]; then
            echo "gradle-wrapper.jar missing — regenerating..."
            GRADLE_VER=$(grep distributionUrl gradle/wrapper/gradle-wrapper.properties \
              | sed -E 's/.*gradle-([0-9.]+)-.*/\1/')
            echo "Target Gradle version: $GRADLE_VER"
            # Download the specified Gradle distribution and run
            # `gradle wrapper` to materialize the correct wrapper jar.
            curl -fsSL -o /tmp/gradle.zip \
              "https://services.gradle.org/distributions/gradle-${GRADLE_VER}-bin.zip"
            unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
            "/tmp/gradle-dist/gradle-${GRADLE_VER}/bin/gradle" \
              wrapper --gradle-version "${GRADLE_VER}" --distribution-type bin
            ls -la gradle/wrapper/
          fi
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename + collect APK
        working-directory: frontend/android
        run: |
          mkdir -p ../../apk-out
          cp app/build/outputs/apk/debug/app-debug.apk ../../apk-out/BuldhanaBandobast.apk
          ls -la ../../apk-out/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BuldhanaBandobast-Android
          path: apk-out/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release (on tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: apk-out/*.apk
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
