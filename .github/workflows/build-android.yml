name: Build Android APK

# Triggers:
#   - Every push/PR to main (builds .apk as a downloadable artifact)
#   - Every tag starting with v* (also publishes a GitHub Release)
#   - Manually from the Actions tab
on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Yarn
        run: npm install -g yarn

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-35 build-tools;35.0.0"

      - name: Install frontend deps
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Build React with LOCAL (offline) backend shim
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: ""
          REACT_APP_USE_LOCAL: "true"
          CI: "false"
          PUBLIC_URL: "."
        run: yarn build

      - name: Initialize Capacitor Android project
        working-directory: frontend
        run: |
          # Capacitor CLI is bundled in repo devDependencies; just sync the
          # generated web assets + config into the already-committed android/
          # folder. No `cap add` needed — that's done in the repo.
          yarn add --dev @capacitor/cli@6.2.1
          npx cap sync android

      - name: Build debug APK (Gradle)
        working-directory: frontend/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename + collect APK
        working-directory: frontend/android
        run: |
          mkdir -p ../../apk-out
          cp app/build/outputs/apk/debug/app-debug.apk ../../apk-out/BuldhanaBandobast.apk
          ls -la ../../apk-out/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BuldhanaBandobast-Android
          path: apk-out/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release (on tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: apk-out/*.apk
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
